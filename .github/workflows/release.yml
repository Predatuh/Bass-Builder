name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Archive web build
        shell: bash
        run: |
          cd build/web
          zip -r ../../bass-builder-web.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: bass-builder-web
          path: bass-builder-web.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath bass-builder-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: bass-builder-windows
          path: bass-builder-windows.zip

  create-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-web
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: bass-builder-web

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: bass-builder-windows

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bass-builder-web.zip
            bass-builder-windows.zip
          generate_release_notes: true
